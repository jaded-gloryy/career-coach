services:
  db:
    env_file:
      - .env.dev
    image: pgvector/pgvector:pg16
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d career_coach"]
      interval: 5s
      timeout: 5s
      retries: 10

  career-coach:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  pgadmin:
    env_file:
      - .env.dev
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
