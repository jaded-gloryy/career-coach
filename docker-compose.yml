services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: career_coach
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d career_coach"]
      interval: 5s
      timeout: 5s
      retries: 10

  career-coach:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://coach:coach@db:5432/career_coach
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID}
      SUPABASE_PUBLISHABLE_API_KEY: ${SUPABASE_PUBLISHABLE_API_KEY}
      SUPABASE_SECRET_API_KEY: ${SUPABASE_SECRET_API_KEY}
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # pgadmin:
  #   image: dpage/pgadmin4:latest
