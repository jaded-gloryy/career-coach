services:
  career-coach:
    build: .
    ports:
      - "9020:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID}
      SUPABASE_PUBLISHABLE_API_KEY: ${SUPABASE_PUBLISHABLE_API_KEY}
      SUPABASE_SECRET_API_KEY: ${SUPABASE_SECRET_API_KEY}
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
    # Healthcheck added below
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
