services:
  career-coach:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID}
      SUPABASE_PUBLISHABLE_API_KEY: ${SUPABASE_PUBLISHABLE_API_KEY}
      SUPABASE_SECRET_API_KEY: ${SUPABASE_SECRET_API_KEY}
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
